<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotspot Radar 控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <p class="eyebrow">AI SIGNAL OPS</p>
            <h1>Hotspot Radar</h1>
          </div>
        </div>

        <nav class="top-nav" aria-label="页面导航">
          <a class="nav-link is-active" href="/">控制台</a>
          <a class="nav-link" href="/hotspots.html">热点信息</a>
        </nav>

        <div class="top-actions">
          <button id="notifyBtn" class="icon-button" type="button" title="开启浏览器通知" aria-label="开启浏览器通知">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17H9m10-2V9A7 7 0 0 0 5 9v6l-2 3h18l-2-3ZM10 21h4"/></svg>
          </button>
          <button id="scanBtn" class="primary-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 12h4l2-7 4 14 2-7h6"/></svg>
            <span>立即扫描</span>
          </button>
        </div>
      </header>

      <div id="readonlyBanner" class="readonly-banner" hidden>
        公开只读模式已开启。访客可以查看热点信息，管理配置需要管理员 Token。
      </div>

      <main class="layout config-layout">
        <section class="control-panel" aria-labelledby="controlTitle">
          <div class="panel-heading">
            <p class="eyebrow">WATCHLIST</p>
            <h2 id="controlTitle">监控配置</h2>
          </div>

          <form id="keywordForm" class="keyword-form">
            <label>
              <span>关键词</span>
              <input id="keywordInput" name="keyword" required placeholder="例如：Claude Code / AI 编程 / GPT-5" />
            </label>
            <label>
              <span>范围</span>
              <input id="scopeInput" name="scope" placeholder="例如：AI 编程" value="AI programming" />
            </label>
            <label>
              <span>扫描间隔（分钟）</span>
              <input id="intervalInput" name="interval" type="number" min="1" max="1440" value="15" />
            </label>
            <button class="secondary-button" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
              <span>加入雷达</span>
            </button>
          </form>

          <div class="watchlist" id="watchlist"></div>

          <div class="quick-route">
            <div>
              <p class="eyebrow">LIVE FEED</p>
              <h3>热点信息</h3>
            </div>
            <a class="ghost-link" href="/hotspots.html">
              <span>打开</span>
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14m-6-6 6 6-6 6"/></svg>
            </a>
          </div>

          <button id="demoBtn" class="ghost-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7-11-7Z"/></svg>
            <span>生成本地演示信号</span>
          </button>
        </section>

        <aside class="ops-panel" aria-labelledby="opsTitle">
          <div class="panel-heading split">
            <div>
              <p class="eyebrow">OPS LOG</p>
              <h2 id="opsTitle">运行状态</h2>
            </div>
            <div class="status-pill" id="statusPill">等待连接</div>
          </div>

          <form id="settingsForm" class="settings-form">
            <label>
              <span>信息保留小时</span>
              <input id="retentionInput" name="retention" type="number" min="1" max="720" value="24" />
            </label>
            <fieldset class="source-fieldset">
              <legend>信息来源</legend>
              <div id="sourceOptions" class="source-options"></div>
            </fieldset>
            <button class="ghost-button compact" type="submit">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 6 9 17l-5-5"/></svg>
              <span>保存设置</span>
            </button>
          </form>

          <div class="meter">
            <span>已选来源</span>
            <strong id="sourceCountLabel">6 类</strong>
          </div>
          <div class="meter">
            <span>默认清理</span>
            <strong id="retentionLabel">24 小时</strong>
          </div>
          <div class="meter">
            <span>真假识别</span>
            <strong>启发式</strong>
          </div>
          <ol id="eventLog" class="event-log"></ol>
        </aside>
      </main>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
